<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Туалетов</title>
    <!-- Подключаем код и стили для карты -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #121212; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Инициализируем Телеграм-окно
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Показываем карту (по умолчанию центр Москвы)
        const map = L.map('map').setView([55.7558, 37.6173], 13);

        // Используем темную красивую подложку для карты
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Ставим одну тестовую точку
        L.marker([55.7558, 37.6173]).addTo(map).bindPopup('<b>Тестовый туалет</b><br>Код: 1234#');
    </script>
</body>
</html>
